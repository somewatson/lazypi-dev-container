services:
  dev-container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lazypi-dev
    volumes:
      # Local project directory
      - ./workspace:/home/dev/workspace
      # Persist LazyPi configuration in local folder
      - ./lazypi_config:/home/dev/.pi
      # Docker socket for Docker-out-of-Docker (DooD)
      - /var/run/docker.sock:/var/run/docker.sock
    # Run as the 'dev' user defined in the Dockerfile to avoid permission issues
    user: dev
    environment:
      - CONTAINER_PROMPT=${CONTAINER_PROMPT:-[lazypi-docker]}
    working_dir: /home/dev/workspace
    stdin_open: true
    tty: true
    # Ensure we have enough permissions for the docker socket
    privileged: true
    ipc: host

